{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    
    <div class="article-meta">
        <span>📅 {{ .Date.Format "02.01.2006" }}</span>
        {{ with .Params.readingtime }}<span> • ⏱️ {{ . }} Lesedauer</span>{{ end }}
        {{ with .Params.author }}<span> • ✍️ {{ . }}</span>{{ end }}
    </div>

    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
